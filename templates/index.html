<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiNote - Panel de Control</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #111827;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
            width: 100%;
            max-width: 450px;
            border: 1px solid #1f2937;
        }
        h1 {
            color: #00ff88;
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
        }
        .desactivado {
            opacity: 0.3;
            pointer-events: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00ff88;
            color: #0b0f19;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            background-color: #00cc6a;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.4);
        }
        hr {
            border: 0;
            height: 1px;
            background: #374151;
            margin: 25px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>LogiNote 📊</h1>
    
    <form action="/calcular" method="POST">
        
        <div class="form-group">
            <label for="materia">¿Qué materia necesitas calcular?</label>
            <input type="text" name="materia" id="materia" placeholder="Ej: Mecánica, Programación, Matemática..." required oninput="controlarFlujo()">
        </div>

        <div id="seccion-calculo" class="desactivado">
            <hr>
            
            <div class="form-group">
                <label for="sistema">Sistema de Calificación</label>
                <select name="sistema" id="sistema">
                    <option value="numerico">Numérico (Latinoamérica)</option>
                    <option value="letras">Letras (A-F - Internacional)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="limite">Nota mínima para aprobar el año</label>
                <input type="number" name="limite" id="limite" value="6" step="0.5" min="1" max="10">
            </div>

            <hr>
            <label style="color: #00ff88; margin-bottom: 15px; font-size: 16px;">Calendario de Trimestres</label>

            <div class="form-group">
                <label for="nota1">Trimestre 1</label>
                <input type="number" name="nota1" id="nota1" step="0.01" min="0" max="10" placeholder="0.00">
            </div>

            <div class="form-group">
                <label for="nota2">Trimestre 2</label>
                <input type="number" name="nota2" id="nota2" step="0.01" min="0" max="10" placeholder="0.00">
            </div>

            <div class="form-group">
                <label for="nota3">Trimestre 3</label>
                <input type="number" name="nota3" id="nota3" step="0.01" min="0" max="10" placeholder="0.00">
            </div>

            <button type="submit">Calcular Metas</button>
        </div>

    </form>
</div>

<script>
    function controlarFlujo() {
        const materiaInput = document.getElementById('materia');
        const seccion = document.getElementById('seccion-calculo');
        
        if (materiaInput.value.trim().length > 0) {
            seccion.classList.remove('desactivado');
        } else {
            seccion.classList.add('desactivado');
        }
    }
</script>

</body>
</html>
