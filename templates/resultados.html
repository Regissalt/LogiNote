<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiNote - Resultados</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #111827;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
            width: 100%;
            max-width: 450px;
            border: 1px solid #1f2937;
            text-align: center;
        }
        h1 {
            color: #00ff88;
            margin-top: 0;
            font-size: 24px;
        }
        .materia-titulo {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .promedio-box {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        .mensaje-box {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #1f2937;
            border-radius: 8px;
            border-left: 4px solid;
        }
        .btn-volver {
            display: inline-block;
            background-color: #00ff88;
            color: #0b0f19;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-volver:hover {
            background-color: #00cc6a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Análisis de Metas</h1>
        <div class="materia-titulo">{{ materia }}</div>
        
        <div class="promedio-box" style="color: {{ color_texto }}">
            {{ '%.2f' | format(promedio) }}
        </div>
        
        <div class="mensaje-box" style="border-left-color: {{ color_texto }}">
            {{ mensaje }}
        </div>
        
        <a href="/" class="btn-volver">Calcular Otra Nota</a>
    </div>
</body>
</html>
